[pytest]
markers =
    long: tests with a longer running time
    slow: heavier unit tests excluded from the fast smoke tier (`pyclawd test fast`)
    examples: example files that serve as integration tests
    docs: documentation compilation tests
    gradient: tests that require gradient computation (autograd/jax)
    golden: behavior-regression snapshot test (Path A — run via `pyclawd golden`)
addopts = --strict-markers