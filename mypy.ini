[mypy]
ignore_missing_imports = True

# `name-defined` re-enabled — it catches undefined names (typos, lost imports)
# and the package is currently clean under it. Still staged as larger, separate
# cleanups: `attr-defined` (~170 hits, much of it dynamic numpy/Individual
# attributes), `arg-type` (~32), and `check_untyped_defs` (~531).
disable_error_code = misc, arg-type, attr-defined, empty-body, annotation-unchecked

disallow_untyped_defs = False
check_untyped_defs = False
